<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing List | Packmates</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="packing-list.css">
</head>

<body>
    <!--Side Navbar -->
    <nav class="sidebar">
        <div class="brand">
            <img src="img/appIcon.png" alt="Packmates" class="icon">
            <span>Packmates</span>
        </div>
        <div class="nav-buttons">
            <button type="reset" onclick="location.href='index.html'"><img src="img/home.png" alt=""
                    class="icon"><span>Home</span></button>
            <button type="reset" onclick="location.href='discover.html'"><img src="img/calendar.png" alt=""
                    class="icon"><span>Discover</span></button>
            <button type="reset" onclick="location.href='notifications.html'"><img src="img/notif.png" alt=""
                    class="icon"><span>Notifications</span></button>
            <button type="reset" onclick="location.href='profile.html'"><img src="img/profile.png" alt=""
                    class="icon"><span>Profile</span></button>
        </div>
        <div class="nav-bottom">
            <hr>
            <button class="logout" type="reset" onclick="location.href='welcome.html'"><img src="img/home.png" alt=""
                    class="icon"><span>Logout</span></button>
        </div>
    </nav>

    <main>
        <div id="cityBanner" class="city-banner"></div>
        <header>
            <h1 id="packingListTitle">Packing List</h1>
            <button class="primary" type="button" onclick="location.href='tripPreview.html'">
                ← Back to Trip
            </button>
        </header>

        <section class="trips packing-screen">
            <!-- Trip summary -->
            <div class="packing-summary">
                <div>
                    <h2 id="packingSummaryTitle">Trip</h2>
                    <p class="packing-sub" id="packingSummaryMeta"></p>
                </div>
                <div class="packing-summary-count">
                    <span class="packing-count-main" id="packedCount">0/0 packed</span>
                    <span class="packing-count-sub" id="unpackedCount">0 items left</span>
                </div>
            </div>

            <!-- Filters + Add item -->
            <div class="packing-controls">
                <div class="packing-filters">
                    <button class="packing-filter-btn packing-filter-btn--active" data-filter="all">All</button>
                    <button class="packing-filter-btn" data-filter="not-packed">Not packed</button>
                    <button class="packing-filter-btn" data-filter="packed">Packed</button>
                </div>
                <button class="packing-add-btn" id="openAddItemModal">+ Add item</button>
            </div>

            <!-- Packing list items (rendered by JS, grouped by category) -->
            <div class="packing-list" id="packingListBody" aria-label="Packing items">
            </div>
        </section>
    </main>

    <!-- Add item modal -->
    <div class="packing-modal-backdrop" id="addItemModal" aria-hidden="true">
        <div class="packing-modal" role="dialog" aria-modal="true" aria-labelledby="addItemTitle">
            <div class="packing-modal-header">
                <h2 id="addItemTitle">Add item</h2>
                <button class="packing-modal-close" id="closeAddItemModal" aria-label="Close">✕</button>
            </div>

            <form class="packing-form" id="addItemForm">
                <label class="packing-field">
                    <span>Item name</span>
                    <input type="text" id="newItemName" placeholder="e.g. Sneakers">
                </label>

                <label class="packing-field">
                    <span>Category</span>
                    <select id="newItemCategory">
                        <option>Essentials</option>
                        <option>Toiletries</option>
                        <option>Clothing</option>
                        <option>Shoes</option>
                        <option>Electronics</option>
                        <option>Business Trip</option>
                        <option>Gym</option>
                        <option>Beach</option>
                        <option>Swimming</option>
                        <option>Snow Sports</option>
                        <option>Hiking</option>
                        <option>Camping</option>
                        <option>Rainy Weather</option>
                        <option>Hot &amp; Sunny Weather</option>
                        <option>Snowy Weather</option>
                        <option>Windy Weather</option>
                        <option>Cold Weather</option>
                    </select>
                </label>

                <label class="packing-field packing-field--inline">
                    <span>Quantity</span>
                    <input type="number" id="newItemQty" min="1" value="1">
                </label>

                <div class="packing-modal-actions">
                    <button type="button" class="packing-btn-secondary" id="cancelAddItem">Cancel</button>
                    <button type="submit" class="packing-btn-primary">Add Item</button>
                </div>
            </form>
        </div>
    </div>

    <script src="packing-list.js"></script>
</body>

</html>
